<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <title>Аналітика класу 3-Б</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #9b59b6; --bg: #f4f7f6; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 20px }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
        }
        
        .card h3 { margin: 0; font-size: 0.9em; color: #7f8c8d; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 1.8em; font-weight: bold; color: var(--primary); }

        .charts-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 25px; 
        }
        
        .chart-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .chart-box h4 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .back-link { display: inline-block; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Назад до кабінету</a>
    <h1>📊 Аналітика та прогрес класу</h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Усього учнів</h3>
            <p id="totalCount">0</p>
        </div>
        <div class="card">
            <h3>Сер. бал класу</h3>
            <p id="classAvg">0.0</p>
        </div>
        <div class="card">
            <h3>Іменинники місяця</h3>
            <p id="bdayCount">0</p>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h4>Середній бал за предметами</h4>
            <canvas id="subjectsChart"></canvas>
        </div>

        <div class="chart-box">
            <h4>Склад класу</h4>
            <canvas id="genderChart"></canvas>
        </div>
    </div>
</div>

<script>
    // 1. КОНФІГУРАЦІЯ FIREBASE (залишається вашою)
    const firebaseConfig = {
        apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
        authDomain: "darya-school.firebaseapp.com",
        databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "darya-school",
        storageBucket: "darya-school.firebasestorage.app",
        messagingSenderId: "228276864041",
        appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    firebase.auth().onAuthStateChanged((user) => {
        if (!user) window.location.href = "login.html";
    });
    
    const database = firebase.database();
    const studentsRef = database.ref('students_v2');
    const gradesRef = database.ref('grades_v2');

    let students = [];
    let allGrades = {};
    let subjectsChart = null;
    let genderChart = null;

    // СЛУХАЧІ
    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        students = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        updateAnalytics();
    });

    gradesRef.on('value', (snapshot) => {
        allGrades = snapshot.val() || {};
        updateAnalytics();
    });

    function updateAnalytics() {
        if (students.length === 0) return;

        // 1. Загальна кількість
        document.getElementById('totalCount').innerText = students.length;

        // 2. Іменинники (виправлено порівняння місяців)
        const currentMonth = new Date().getMonth();
        const bdays = students.filter(s => {
            if (!s.birthDate) return false;
            return new Date(s.birthDate).getMonth() === currentMonth;
        }).length;
        document.getElementById('bdayCount').innerText = bdays;

        // 3. Предмети
        const subjectMap = {
            math: "Математика",
            ukr: "Укр. мова",
            reading: "Читання",
            eng: "Англійська",
            world: "ЯДС"
        };

        const subjectKeys = Object.keys(subjectMap);
        const avgData = subjectKeys.map(subKey => {
            let sum = 0;
            let count = 0;
            
            Object.keys(allGrades).forEach(gradeKey => {
                // Ключ у журналі: subject_studentId_column
                // Перевіряємо, чи він починається з subKey (напр. "world_")
                if (gradeKey.startsWith(subKey + "_")) {
                    const rawVal = allGrades[gradeKey];
                    let val = 0;
        
                    // Перевірка на формат об'єкта (якщо є коментар) або просто числа
                    if (rawVal && typeof rawVal === 'object') {
                        val = parseInt(rawVal.value);
                    } else {
                        val = parseInt(rawVal);
                    }
        
                    if (!isNaN(val) && val > 0) {
                        sum += val;
                        count++;
                    }
                }
            });
            return count > 0 ? parseFloat((sum / count).toFixed(1)) : 0;
        });

        // 4. Розрахунок загального середнього балу класу (тільки по існуючих оцінках)
        const activeSubjects = avgData.filter(val => val > 0);
        const totalAvgRaw = activeSubjects.length > 0 
            ? (activeSubjects.reduce((a, b) => a + b, 0) / activeSubjects.length).toFixed(1) 
            : "0.0";
        
        document.getElementById('classAvg').innerText = totalAvgRaw;

        // --- ГРАФІКИ ---

        // Бар-чарт предметів
        const ctxSub = document.getElementById('subjectsChart').getContext('2d');
        if (subjectsChart) subjectsChart.destroy();
        subjectsChart = new Chart(ctxSub, {
            type: 'bar',
            data: {
                labels: Object.values(subjectMap),
                datasets: [{
                    label: 'Середній бал',
                    data: avgData,
                    backgroundColor: 'rgba(155, 89, 182, 0.6)',
                    borderColor: 'rgba(155, 89, 182, 1)',
                    borderWidth: 1
                }]
            },
            options: { 
                responsive: true,
                scales: { y: { beginAtZero: true, max: 12 } } 
            }
        });

        // Донат статі
        const ctxGen = document.getElementById('genderChart').getContext('2d');
        const boys = students.filter(s => s.gender === 'Хлопчик').length;
        const girls = students.filter(s => s.gender === 'Дівчинка').length;

        if (genderChart) genderChart.destroy();
        genderChart = new Chart(ctxGen, {
            type: 'doughnut',
            data: {
                labels: ['Хлопчики', 'Дівчатка'],
                datasets: [{
                    data: [boys, girls],
                    backgroundColor: ['#3498db', '#e74c3c'],
                    hoverOffset: 4
                }]
            },
            options: { responsive: true }
        });
    }
</script>

</body>
</html>
