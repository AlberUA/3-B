<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал оцінок 3-Б</title>
    <style>
        :root { --primary: #34495e; --accent: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        
        select, button { padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.9em; }
        button { background: #2ecc71; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #27ae60; }

        .table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #eef0f2; padding: 10px; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; }
        
        .student-name { text-align: left; min-width: 220px; color: var(--primary); font-size: 0.95em; }
        .student-name span { color: #95a5a6; font-weight: normal; margin-right: 5px; }
        
        input.grade { width: 30px; border: 1px solid transparent; text-align: center; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        input.grade:focus { border-color: var(--accent); background: #fffde7; outline: none; }
        
        .back-link { text-decoration: none; color: #3498db; font-weight: 500; font-size: 0.9em; }

        .hw-input {
            transition: 0.3s;
            font-size: 0.9em;
        }
        .hw-input:focus {
            background: #fffde7;
            border-color: #f1c40f !important;
            outline: none;
        }
        #hwTable td {
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>
            <a href="index.html" class="back-link">← Кабінет</a>
            <h2 style="margin: 5px 0 0 0;">Журнал оцінок</h2>
        </div>
        <div class="controls">
            <select id="subjectSelect">
                <option value="math">Математика</option>
                <option value="ukr">Українська мова</option>
                <option value="reading">Читання</option>
                <option value="eng">Англійська мова</option>
                <option value="world">Я досліджую світ</option>
            </select>
            <button onclick="saveGrades()">Зберегти зміни</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="journalTable">
            <thead>
                <tr id="headerRow">
                    <th>№</th>
                    <th>Прізвище та Ім'я</th>
                    <th>Сер. бал</th>
                    </tr>
            </thead>
            <tbody id="journalBody"></tbody>
        </table>
    </div>
</div>

<div class="container" style="margin-top: 20px; border-top: 4px solid var(--accent);">
    <div class="header-box">
        <h3 style="margin: 0;">📝 Домашнє завдання: <span id="subjectNameDisplay">Математика</span></h3>
    </div>
    
    <div class="table-wrapper">
        <table id="hwTable">
            <thead>
                <tr>
                    <th style="width: 80px;">Урок №</th>
                    <th>Що задано (тема, вправи, сторінки)</th>
                </tr>
            </thead>
            <tbody id="hwBody">
                </tbody>
        </table>
    </div>
    <div style="margin-top: 15px; text-align: right;">
        <button onclick="saveAllData()" style="background: #3498db;">Зберегти все (Оцінки + ДЗ)</button>
    </div>
</div>

<script>
    // 1. Завантажуємо дані з localStorage
    let students = JSON.parse(localStorage.getItem('class_3b_students_v2')) || [];
    let allGrades = JSON.parse(localStorage.getItem('class_3b_grades_v2')) || {};

    const headerRow = document.getElementById('headerRow');
    const journalBody = document.getElementById('journalBody');
    const subjectSelect = document.getElementById('subjectSelect');
    const cols = 12;

    // 2. ЯВНО ВИЗНАЧАЄМО ФУНКЦІЮ ЯК ГЛОБАЛЬНУ
    window.updateAverage = function(sIdx) {
        const subject = subjectSelect.value;
        let sum = 0;
        let count = 0;

        // Знаходимо всі інпути саме для цього учня
        const studentInputs = document.querySelectorAll(`.grade[data-student="${sIdx}"]`);
        
        studentInputs.forEach(input => {
            const val = input.value.trim();
            if (val && !isNaN(val) && val !== "") {
                sum += parseInt(val);
                count++;
            }
        });

        const avgElement = document.getElementById(`avg-${sIdx}`);
        if (avgElement) {
            avgElement.innerText = count > 0 ? (sum / count).toFixed(1) : '-';
            
            // Додатково: колір залежно від балу
            const score = parseFloat(avgElement.innerText);
            if (score >= 10) avgElement.style.color = "#27ae60"; // Зелений
            else if (score <= 3) avgElement.style.color = "#e74c3c"; // Червоний
            else avgElement.style.color = "#2c3e50"; // Звичайний
        }
    };

    // 3. Функція ініціалізації таблиці
    function initJournal() {
        const subject = subjectSelect.value;

        // Оновлюємо шапку (Сер. бал тепер завжди останній)
        let headerHTML = '<th>№</th><th>Прізвище та Ім\'я</th>';
        for(let i=1; i<=cols; i++) {
            headerHTML += `<th>${i}</th>`;
        }
        headerHTML += '<th>Сер. бал</th>';
        headerRow.innerHTML = headerHTML;

        // Рендеримо рядки учнів
        journalBody.innerHTML = '';
        if(students.length === 0) {
            journalBody.innerHTML = `<tr><td colspan="${cols + 3}" style="padding:20px; color:#999;">Список учнів порожній.</td></tr>`;
            return;
        }

        students.forEach((s, sIdx) => {
            const fullName = `${s.lastName} ${s.firstName}`;
            let sum = 0;
            let count = 0;
            
            let row = `<tr>
                <td>${sIdx + 1}</td>
                <td class="student-name">${fullName}</td>`;
            
            for(let i=1; i<=cols; i++) {
                const gradeKey = `${subject}_${sIdx}_${i}`;
                const val = allGrades[gradeKey] || '';
                
                if (val && !isNaN(val) && val !== "") { 
                    sum += parseInt(val); 
                    count++; 
                }

                // ВАЖЛИВО: додаємо data-student для зв'язку
                row += `<td><input type="text" class="grade" 
                            oninput="window.updateAverage(${sIdx})" 
                            data-student="${sIdx}"
                            data-key="${gradeKey}" 
                            value="${val}" maxlength="2"></td>`;
            }
            
            const avg = count > 0 ? (sum / count).toFixed(1) : '-';
            row += `<td id="avg-${sIdx}" style="font-weight:bold; color:#2c3e50; background:#f9f9f9;">${avg}</td></tr>`;
            journalBody.innerHTML += row;
        });
    }

    // 4. Функція збереження
    window.saveGrades = function() {
        const inputs = document.querySelectorAll('.grade');
        inputs.forEach(input => {
            allGrades[input.dataset.key] = input.value;
        });
        localStorage.setItem('class_3b_grades_v2', JSON.stringify(allGrades));
        alert('Оцінки збережено!');
    };

    subjectSelect.addEventListener('change', initJournal);

    // 5. Додаємо новий об'єкт для ДЗ
    let allHomework = JSON.parse(localStorage.getItem('class_3b_hw_v2')) || {};
    
    // Оновлюємо функцію initJournal, щоб вона малювала і таблицю ДЗ
    function initJournal() {
        const subject = subjectSelect.value;
        const subjectText = subjectSelect.options[subjectSelect.selectedIndex].text;
        document.getElementById('subjectNameDisplay').innerText = subjectText;
    
        // ... (тут ваш існуючий код рендеру таблиці оцінок) ...
        // Викликаємо рендер таблиці ДЗ
        renderHomeworkTable(subject);
    }
    
    function renderHomeworkTable(subject) {
        const hwBody = document.getElementById('hwBody');
        hwBody.innerHTML = '';
    
        for (let i = 1; i <= 12; i++) {
            const hwKey = `${subject}_hw_${i}`;
            const hwValue = allHomework[hwKey] || '';
            
            hwBody.innerHTML += `
                <tr>
                    <td style="font-weight:bold; background:#f8f9fa;">${i}</td>
                    <td>
                        <input type="text" class="hw-input" 
                               data-key="${hwKey}" 
                               value="${hwValue}" 
                               placeholder="Наприклад: ст. 45, впр. 3..." 
                               style="width:95%; padding:8px; border:1px solid transparent; border-radius:4px;">
                    </td>
                </tr>
            `;
        }
    }
    
    // Функція збереження тепер охоплює і ДЗ
    window.saveAllData = function() {
        // Зберігаємо оцінки
        const gradeInputs = document.querySelectorAll('.grade');
        gradeInputs.forEach(input => {
            allGrades[input.dataset.key] = input.value;
        });
        localStorage.setItem('class_3b_grades_v2', JSON.stringify(allGrades));
    
        // Зберігаємо ДЗ
        const hwInputs = document.querySelectorAll('.hw-input');
        hwInputs.forEach(input => {
            allHomework[input.dataset.key] = input.value;
        });
        localStorage.setItem('class_3b_hw_v2', JSON.stringify(allHomework));
    
        alert('Дані успішно збережено: оцінки та домашні завдання оновлено!');
    };
    
    // Запуск при завантаженні
    document.addEventListener('DOMContentLoaded', initJournal);
</script>

</body>
</html>
