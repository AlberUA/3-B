<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" href="favicon.ico">
    <title>Журнал оцінок 3-Б</title>
    <style>
        :root { --primary: #34495e; --accent: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f1c40f; padding-bottom: 15px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        
        select, button { padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.9em; }
        button { background: #2ecc71; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #27ae60; }

        .table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #eef0f2; padding: 10px; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; }
        
        .student-name { text-align: left; min-width: 220px; color: var(--primary); font-size: 0.95em; }
        .student-name span { color: #95a5a6; font-weight: normal; margin-right: 5px; }
        
        input.grade { width: 30px; border: 1px solid transparent; text-align: center; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        input.grade:focus { border-color: var(--accent); background: #fffde7; outline: none; }
        
        .back-link { text-decoration: none; color: #3498db; font-weight: 500; font-size: 0.9em; margin-bottom:20px }

        .hw-input {
            transition: 0.3s;
            font-size: 0.9em;
        }
        .hw-input:focus {
            background: #fffde7;
            border-color: #f1c40f !important;
            outline: none;
        }
        #hwTable td {
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>
            <a href="index.html" class="back-link">← Назад до кабінету</a>
            <h1 style="margin: 5px 0 0 0;">Журнал оцінок</h2>
        </div>
        <div class="controls">
            <select id="subjectSelect">
                <option value="math">Математика</option>
                <option value="ukr">Українська мова</option>
                <option value="reading">Читання</option>
                <option value="eng">Англійська мова</option>
                <option value="world">Я досліджую світ</option>
            </select>
            <button onclick="saveGrades()">Зберегти зміни</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="journalTable">
            <thead>
                <tr id="headerRow">
                    <th>№</th>
                    <th>Прізвище та Ім'я</th>
                    <th>Сер. бал</th>
                    </tr>
            </thead>
            <tbody id="journalBody"></tbody>
        </table>
    </div>
</div>

<div class="container" style="margin-top: 20px; border-top: 4px solid var(--accent);">
    <div class="header-box">
        <h3 style="margin: 0;">📝 Домашнє завдання: <span id="subjectNameDisplay">Математика</span></h3>
    </div>
    
    <div class="table-wrapper">
        <table id="hwTable">
            <thead>
                <tr>
                    <th style="width: 80px;">Урок №</th>
                    <th>Що задано (тема, вправи, сторінки)</th>
                </tr>
            </thead>
            <tbody id="hwBody">
                </tbody>
        </table>
    </div>
    <div style="margin-top: 15px; text-align: right;">
        <button onclick="saveAllData()" style="background: #3498db;">Зберегти все (Оцінки + ДЗ)</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
      authDomain: "darya-school.firebaseapp.com",
      projectId: "darya-school",
      databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
      storageBucket: "darya-school.firebasestorage.app",
      messagingSenderId: "228276864041",
      appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    firebase.initializeApp(firebaseConfig);

    // ЗАХИСТ: Перевірка авторизації
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });
    
    const database = firebase.database();
    
    // Посилання на три різні гілки в базі
    const studentsRef = database.ref('students_v2');
    const gradesRef = database.ref('grades_v2');
    const homeworkRef = database.ref('homework_v2');

    let students = [];
    let allGrades = {};
    let allHomework = {};
    const cols = 12;

    // СЛУХАЧІ ДАНИХ (Спрацьовують при будь-якій зміні в хмарі)
    
    // 1. Завантаження учнів
    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        students = [];
        if (data) {
            Object.keys(data).forEach(key => {
                students.push({ id: key, ...data[key] });
            });
            // Сортуємо, щоб список у журналі збігався зі списком реєстрації
            students.sort((a, b) => a.lastName.localeCompare(b.lastName, 'uk'));
        }
        initJournal(); // Перемальовуємо, коли прийшли учні
    });

    // 2. Завантаження оцінок
    gradesRef.on('value', (snapshot) => {
        allGrades = snapshot.val() || {};
        initJournal();
    });

    // 3. Завантаження ДЗ
    homeworkRef.on('value', (snapshot) => {
        allHomework = snapshot.val() || {};
        renderHomeworkTable(document.getElementById('subjectSelect').value);
    });

    function initJournal() {
        const subject = document.getElementById('subjectSelect').value;
        const journalBody = document.getElementById('journalBody');
        const headerRow = document.getElementById('headerRow');

        // Малюємо шапку
        let headerHTML = '<th>№</th><th>Прізвище та Ім\'я</th>';
        for(let i=1; i<=cols; i++) headerHTML += `<th>${i}</th>`;
        headerHTML += '<th>Сер. бал</th>';
        headerRow.innerHTML = headerHTML;

        journalBody.innerHTML = '';
        if(students.length === 0) return;

        students.forEach((s, idx) => {
            let sum = 0, count = 0;
            let row = `<tr><td>${idx + 1}</td><td style="min-width:180px;text-align:left"><strong>${s.lastName}</strong> ${s.firstName}</td>`;
            
            for(let i=1; i<=cols; i++) {
                // Ключ тепер будується на основі унікального ID учня (s.id)
                const key = `${subject}_${s.id}_${i}`;
                const val = allGrades[key] || '';
                
                if (val && !isNaN(val)) { sum += parseInt(val); count++; }
                
                row += `<td><input type="text" class="grade" 
                            data-student-id="${s.id}" 
                            data-key="${key}" 
                            oninput="updateAverage('${s.id}')"
                            value="${val}" maxlength="2"></td>`;
            }
            const avg = count > 0 ? (sum / count).toFixed(1) : '-';
            row += `<td id="avg-${s.id}" style="font-weight:bold; background:#f9f9f9;">${avg}</td></tr>`;
            journalBody.innerHTML += row;
        });
    }

    // Оновлення середнього балу (локально для швидкості)
    window.updateAverage = function(studentId) {
        let sum = 0, count = 0;
        const inputs = document.querySelectorAll(`.grade[data-student-id="${studentId}"]`);
        inputs.forEach(input => {
            const val = input.value.trim();
            if (val && !isNaN(val)) { sum += parseInt(val); count++; }
        });
        const avgElement = document.getElementById(`avg-${studentId}`);
        if (avgElement) avgElement.innerText = count > 0 ? (sum / count).toFixed(1) : '-';
    };

    function renderHomeworkTable(subject) {
        const hwBody = document.getElementById('hwBody');
        hwBody.innerHTML = '';
        for (let i = 1; i <= 15; i++) {
            const key = `${subject}_hw_${i}`;
            hwBody.innerHTML += `<tr>
                <td style="width:40px; font-weight:bold;">${i}</td>
                <td><input type="text" class="hw-input" data-key="${key}" value="${allHomework[key] || ''}" style="width:98%; padding:8px; border:1px solid #eee;"></td>
            </tr>`;
        }
    }

    // КНОПКА "ЗБЕРЕГТИ ВСЕ"
    window.saveAllData = function() {
        const updates = {};
        
        // Збираємо оцінки
        document.querySelectorAll('.grade').forEach(input => {
            updates[`/grades_v2/${input.dataset.key}`] = input.value;
        });

        // Збираємо ДЗ
        document.querySelectorAll('.hw-input').forEach(input => {
            updates[`/homework_v2/${input.dataset.key}`] = input.value;
        });

        // Відправляємо одним махом у Firebase (це швидше і надійніше)
        database.ref().update(updates)
            .then(() => alert('Дані успішно синхронізовано з хмарою!'))
            .catch(err => alert('Помилка збереження: ' + err));
    };

    document.getElementById('subjectSelect').addEventListener('change', () => {
        initJournal();
        renderHomeworkTable(document.getElementById('subjectSelect').value);
    });
</script>

</body>
</html>
