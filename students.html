<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список учнів з деталями</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f4f7f6; --dark: #34495e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #7f8c8d; text-decoration: none; font-weight: 500; }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        /* Стилі форми */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; margin-bottom: 5px; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        button#addBtn { 
            grid-column: 1 / -1; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.2s;
        }
        button#addBtn:hover { background: #27ae60; }

        /* Таблиця */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fcfcfc; color: #95a5a6; font-size: 0.8em; text-transform: uppercase; }
        .delete-btn { color: #e74c3c; cursor: pointer; border: none; background: none; font-size: 1.2em; }
        
        .gender-icon { font-size: 1.1em; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Назад до кабінету</a>
    <h2>Реєстрація учнів 3-Б класу</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>Прізвище</label>
            <input type="text" id="lastName" placeholder="Петренко">
        </div>
        <div class="form-group">
            <label>Ім'я</label>
            <input type="text" id="firstName" placeholder="Іван">
        </div>
        <div class="form-group">
            <label>Стать</label>
            <select id="gender">
                <option value="Хлопчик">Хлопчик</option>
                <option value="Дівчинка">Дівчинка</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата народження</label>
            <input type="date" id="birthDate">
        </div>
        <button id="addBtn">Додати учня до списку</button>
    </div>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>№</th>
                <th>Прізвище та Ім'я</th>
                <th>Стать</th>
                <th>Дата нар.</th>
                <th>Вік</th>
                <th>Дія</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>
</div>

<script>
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('studentList');
    
    let students = JSON.parse(localStorage.getItem('class_3b_students_v2')) || [];
    
    // Функція розрахунку віку (повертає точну кількість років)
    function calculateAge(birthday) {
        const birthDate = new Date(birthday);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        
        // Коригування, якщо день народження ще не настав у цьому році
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        return age;
    }
    
    function renderStudents() {
        list.innerHTML = '';
        students.forEach((s, index) => {
            const age = calculateAge(s.birthDate);
            const genderSymbol = s.gender === 'Хлопчик' ? '👦' : '👧';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><strong>${s.lastName}</strong> ${s.firstName}</td>
                <td><span class="gender-icon">${genderSymbol}</span> ${s.gender}</td>
                <td>${s.birthDate}</td>
                <td>${age} р.</td>
                <td><button class="delete-btn" onclick="deleteStudent(${index})">&times;</button></td>
            `;
            list.appendChild(tr);
        });
        localStorage.setItem('class_3b_students_v2', JSON.stringify(students));
    }
    
    addBtn.addEventListener('click', () => {
        const fName = document.getElementById('firstName').value.trim();
        const lName = document.getElementById('lastName').value.trim();
        const gender = document.getElementById('gender').value;
        const bDate = document.getElementById('birthDate').value;
    
        if (fName && lName && bDate) {
            const currentAge = calculateAge(bDate);
    
            // ПЕРЕВІРКА ВІКУ
            if (currentAge < 9) {
                alert(`Помилка: Учень надто молодий (${currentAge} р.). Для 3-го класу вік має бути не менше 9 років.`);
                return; // Перериваємо виконання функції
            } else if (currentAge > 11) {
                alert(`Помилка: Учень надто дорослий (${currentAge} р.). Для 3-го класу вік має бути не більше 11 років.`);
                return; // Перериваємо виконання функції
            }
    
            const newStudent = {
                firstName: fName,
                lastName: lName,
                gender: gender,
                birthDate: bDate
            };
    
            students.push(newStudent);
            
            // Очищення полів
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('birthDate').value = '';
            
            renderStudents();
        } else {
            alert('Будь ласка, заповніть усі поля');
        }
    });
    
    window.deleteStudent = (index) => {
        if(confirm('Видалити учня зі списку?')) {
            students.splice(index, 1);
            renderStudents();
        }
    };
    
    renderStudents();
</script>

</body>
</html>
