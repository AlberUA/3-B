<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список учнів з деталями</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f4f7f6; --dark: #34495e; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #7f8c8d; text-decoration: none; font-weight: 500; }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; margin-bottom: 5px; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        button#addBtn { 
            grid-column: 1 / -1; 
            background: var(--primary); 
            color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button#addBtn:hover { background: #27ae60; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fcfcfc; color: #95a5a6; font-size: 0.8em; text-transform: uppercase; }

        /* Стилі для кнопок дій */
        .btn-action {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .edit-btn { background: var(--blue); color: white; margin-right: 5px; }
        .edit-btn:hover { background: #2980b9; transform: translateY(-1px); }
        
        .delete-btn { background: #fff1f0; color: #e74c3c; border: 1px solid #ffa39e; }
        .delete-btn:hover { background: #e74c3c; color: white; }
        
        .gender-icon { font-size: 1.1em; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Назад до кабінету</a>
    <h2>Реєстрація учнів 3-Б класу</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>Прізвище</label>
            <input type="text" id="lastName" placeholder="Петренко">
        </div>
        <div class="form-group">
            <label>Ім'я</label>
            <input type="text" id="firstName" placeholder="Іван">
        </div>
        <div class="form-group">
            <label>Стать</label>
            <select id="gender">
                <option value="Хлопчик">Хлопчик</option>
                <option value="Дівчинка">Дівчинка</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата народження</label>
            <input type="date" id="birthDate">
        </div>
        <button id="addBtn">Додати учня до списку</button>
    </div>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>№</th>
                <th>Прізвище та Ім'я</th>
                <th>Стать</th>
                <th>Дата нар.</th>
                <th>Вік</th>
                <th style="text-align: right;">Дії</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>
</div>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:12px; width:380px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">✏️ Редагувати учня</h3>
        <input type="hidden" id="editIndex">
        <div style="margin-bottom:12px;">
            <label>Прізвище</label>
            <input type="text" id="editLastName" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:12px;">
            <label>Ім'я</label>
            <input type="text" id="editFirstName" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:12px;">
            <label>Дата народження</label>
            <input type="date" id="editBirthDate" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:20px;">
            <label>Стать</label>
            <select id="editGender" style="width:100%; box-sizing: border-box;">
                <option value="Хлопчик">Хлопчик</option>
                <option value="Дівчинка">Дівчинка</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="closeEditModal()" style="background:#bdc3c7; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">Скасувати</button>
            <button onclick="saveStudentEdit()" style="background:var(--blue); border:none; padding:10px 15px; color:white; border-radius:6px; cursor:pointer;">Зберегти</button>
        </div>
    </div>
</div>

<script>
    const list = document.getElementById('studentList');
    let students = JSON.parse(localStorage.getItem('class_3b_students_v2')) || [];
    
    function calculateAge(birthday) {
        const birthDate = new Date(birthday);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        return age;
    }
    
    function renderStudents() {
        list.innerHTML = '';
        students.forEach((s, index) => {
            const age = calculateAge(s.birthDate);
            const genderSymbol = s.gender === 'Хлопчик' ? '👦' : '👧';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><strong>${s.lastName}</strong> ${s.firstName}</td>
                <td><span class="gender-icon">${genderSymbol}</span> ${s.gender}</td>
                <td>${s.birthDate}</td>
                <td>${age} р.</td>
                <td style="text-align: right;">
                    <button class="btn-action edit-btn" onclick="openEditModal(${index})">✏️ Ред.</button>
                    <button class="btn-action delete-btn" onclick="deleteStudent(${index})">🗑️</button>
                </td>
            `;
            list.appendChild(tr);
        });
        localStorage.setItem('class_3b_students_v2', JSON.stringify(students));
    }
    
    document.getElementById('addBtn').addEventListener('click', () => {
        const fName = document.getElementById('firstName').value.trim();
        const lName = document.getElementById('lastName').value.trim();
        const gender = document.getElementById('gender').value;
        const bDate = document.getElementById('birthDate').value;

        if (fName && lName && bDate) {
            const currentAge = calculateAge(bDate);
            if (currentAge < 8 || currentAge > 12) {
                alert(`Перевірте дату народження. Вік (${currentAge} р.) не відповідає 3-му класу.`);
                return;
            }

            students.push({ firstName: fName, lastName: lName, gender: gender, birthDate: bDate });
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('birthDate').value = '';
            renderStudents();
        } else {
            alert('Будь ласка, заповніть усі поля');
        }
    });

    window.deleteStudent = (index) => {
        if(confirm('Видалити учня?')) {
            students.splice(index, 1);
            renderStudents();
        }
    };

    window.openEditModal = function(index) {
        const s = students[index];
        document.getElementById('editIndex').value = index;
        document.getElementById('editLastName').value = s.lastName;
        document.getElementById('editFirstName').value = s.firstName;
        document.getElementById('editBirthDate').value = s.birthDate;
        document.getElementById('editGender').value = s.gender;
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

    window.saveStudentEdit = function() {
        const index = document.getElementById('editIndex').value;
        students[index] = {
            lastName: document.getElementById('editLastName').value,
            firstName: document.getElementById('editFirstName').value,
            birthDate: document.getElementById('editBirthDate').value,
            gender: document.getElementById('editGender').value
        };
        renderStudents(); 
        closeEditModal();
    };

    renderStudents();
</script>
</body>
</html>
