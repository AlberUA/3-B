<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" href="favicon.ico">
    <title>Список учнів з деталями</title>
    <style>
        :root { --primary: #2ecc71; --bg: #f4f7f6; --dark: #34495e; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .back-link { display: block; text-decoration: none; color: #3498db; font-weight: 500; margin-bottom:20px }
        h1 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; margin-bottom: 5px; color: #666; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        button#addBtn { 
            grid-column: 1 / -1; 
            background: var(--primary); 
            color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button#addBtn:hover { background: #27ae60; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fcfcfc; color: #95a5a6; font-size: 0.8em; text-transform: uppercase; }

        /* Стилі для кнопок дій */
        .btn-action {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .edit-btn { background: var(--blue); color: white; margin-right: 5px; }
        .edit-btn:hover { background: #2980b9; transform: translateY(-1px); }
        
        .delete-btn { background: #fff1f0; color: #e74c3c; border: 1px solid #ffa39e; }
        .delete-btn:hover { background: #e74c3c; color: white; }
        
        .gender-icon { font-size: 1.1em; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Назад до кабінету</a>
    <h1>🧑‍🎓 Реєстрація учнів 3-Б класу</h1>

    <div class="form-grid">
        <div class="form-group">
            <label>Прізвище</label>
            <input type="text" id="lastName" placeholder="Петренко">
        </div>
        <div class="form-group">
            <label>Ім'я</label>
            <input type="text" id="firstName" placeholder="Іван">
        </div>
        <div class="form-group">
            <label>Стать</label>
            <select id="gender">
                <option value="Хлопчик">Хлопчик</option>
                <option value="Дівчинка">Дівчинка</option>
            </select>
        </div>
        <div class="form-group">
            <label>Рівень знань:</label>
            <select id="studentLevel">
                <option value="excellent">Відмінник (10-12)</option>
                <option value="good">Хорошист (7-9)</option>
                <option value="needs_help">Потребує уваги (1-6)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Дата народження</label>
            <input type="date" id="birthDate">
        </div>
        <button id="addBtn">Додати учня до списку</button>
    </div>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>№</th>
                <th>Прізвище та Ім'я</th>
                <th>Стать</th>
                <th>Дата нар.</th>
                <th>Вік</th>
                <th style="text-align: right;">Дії</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>
</div>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:12px; width:380px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">✏️ Редагувати учня</h3>
        <input type="hidden" id="editIndex">
        <div style="margin-bottom:12px;">
            <label>Прізвище</label>
            <input type="text" id="editLastName" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:12px;">
            <label>Ім'я</label>
            <input type="text" id="editFirstName" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:12px;">
            <label>Дата народження</label>
            <input type="date" id="editBirthDate" style="width:100%; box-sizing: border-box;">
        </div>
        <div style="margin-bottom:20px;">
            <label>Стать</label>
            <select id="editGender" style="width:100%; box-sizing: border-box;">
                <option value="Хлопчик">Хлопчик</option>
                <option value="Дівчинка">Дівчинка</option>
            </select>
        </div>
        <div style="margin-bottom:20px;">
            <label>Рівень знань</label>
            <select id="editStudentLevel" style="width:100%; box-sizing: border-box; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
                <option value="excellent">Відмінник (10-12)</option>
                <option value="good">Хорошист (7-9)</option>
                <option value="needs_help">Потребує уваги (1-6)</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button onclick="closeEditModal()" style="background:#bdc3c7; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">Скасувати</button>
            <button onclick="saveStudentEdit()" style="background:var(--blue); border:none; padding:10px 15px; color:white; border-radius:6px; cursor:pointer;">Зберегти</button>
        </div>
    </div>
</div>

<script>
    // 1. КОНФІГУРАЦІЯ FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
      authDomain: "darya-school.firebaseapp.com",
      projectId: "darya-school",
      databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
      storageBucket: "darya-school.firebasestorage.app",
      messagingSenderId: "228276864041",
      appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    // Ініціалізація Firebase
    firebase.initializeApp(firebaseConfig);

    // ЗАХИСТ: Перевірка авторизації
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });
    
    const database = firebase.database(); // Посилання на базу даних
    const studentsRef = database.ref('students_v2'); // Посилання на вузол з учнями

    let students = []; // Локальний масив для роботи
    const list = document.getElementById('studentList');

    // 2. СЛУХАЧ РЕАЛЬНОГО ЧАСУ (Найкрутіша фішка Firebase)
    // Ця функція спрацьовує один раз при завантаженні ТА КОЖЕН РАЗ, коли дані змінюються в хмарі.
    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();

        // Перетворюємо об'єкт Firebase у масив
        students = [];
        if (data) {
            Object.keys(data).forEach(key => {
                students.push({
                    id: key, // Зберігаємо унікальний ID від Firebase
                    ...data[key]
                });
            });
        }

        // Сортування за алфавітом (А-Я) при кожному оновленні
        students.sort((a, b) => a.lastName.localeCompare(b.lastName, 'uk'));

        renderStudents(); // Малюємо таблицю
    });

    // 3. Існуючі допоміжні функції (без змін)
    function calculateAge(birthday) {
        const birthDate = new Date(birthday);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        return age;
    }

    // 4. Оновлений рендер (тепер використовує унікальний ID замість індексу)
    function renderStudents() {
        list.innerHTML = '';
        students.forEach((s, index) => {
            const age = calculateAge(s.birthDate);
            const genderSymbol = s.gender === 'Хлопчик' ? '👦' : '👧';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><strong>${s.lastName}</strong> ${s.firstName}</td>
                <td><span class="gender-icon">${genderSymbol}</span> ${s.gender}</td>
                <td>${s.birthDate}</td>
                <td>${age} р.</td>
                <td style="text-align: right;">
                    <button class="btn-action edit-btn" onclick="openEditModal('${s.id}')">✏️ Ред.</button>
                    <button class="btn-action delete-btn" onclick="deleteStudent('${s.id}')">🗑️</button>
                </td>
            `;
            list.appendChild(tr);
        });
    }

    // 5. Оновлені функції додавання
    document.getElementById('addBtn').addEventListener('click', () => {
        const fName = document.getElementById('firstName').value.trim();
        const lName = document.getElementById('lastName').value.trim();
        const gender = document.getElementById('gender').value;
        const bDate = document.getElementById('birthDate').value;
        const level = document.getElementById('studentLevel').value; // ДОДАНО
    
        if (fName && lName && bDate) {
            studentsRef.push({
                firstName: fName,
                lastName: lName,
                gender: gender,
                birthDate: bDate,
                level: level // ДОДАНО
            });
    
            // Очищення полів
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('birthDate').value = '';
        } else {
            alert('Будь ласка, заповніть усі поля');
        }
    });

    window.deleteStudent = (studentId) => {
        if(confirm('Видалити учня?')) {
            // Видалення через Firebase (метод .remove)
            database.ref('students_v2/' + studentId).remove();
        }
    };

    // Функція відкриття модалки
    window.openEditModal = function(studentId) {
        const s = students.find(student => student.id === studentId);
        if(s) {
            document.getElementById('editIndex').value = studentId;
            document.getElementById('editLastName').value = s.lastName;
            document.getElementById('editFirstName').value = s.firstName;
            document.getElementById('editBirthDate').value = s.birthDate;
            document.getElementById('editGender').value = s.gender;
            document.getElementById('editStudentLevel').value = s.level || 'good'; // ДОДАНО (дефолт хорошист)
            document.getElementById('editModal').style.display = 'flex';
        }
    };

    window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

    // Функція збереження змін
    window.saveStudentEdit = function() {
        const studentId = document.getElementById('editIndex').value;
    
        database.ref('students_v2/' + studentId).update({
            lastName: document.getElementById('editLastName').value,
            firstName: document.getElementById('editFirstName').value,
            birthDate: document.getElementById('editBirthDate').value,
            gender: document.getElementById('editGender').value,
            level: document.getElementById('editStudentLevel').value // ДОДАНО
        });
    
        closeEditModal();
    };
</script>
</body>
</html>
