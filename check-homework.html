<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" href="favicon.ico">
    <title>Перевірка робіт 3-Б</title>
    <style>
        :root { --primary: #34495e; --accent: #f1c40f; --bg: #f4f7f6; --text-hand: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1c40f; padding-bottom: 15px;}
        .controls { display: flex; gap: 15px; align-items: center; }
        
        select, button { padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.9em; }
        button { background: #3498db; color: white; cursor: pointer; border: none; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        
        .back-link { display: block; text-decoration: none; color: #3498db; font-weight: 500; font-size: 0.9em; margin-bottom: 20px }

        /* Стиль списку учнів */
        .student-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .student-item { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .student-item:hover { background: #eef0f2; transform: translateX(5px); }
        .student-item.active { border-color: var(--accent); background: #fffde7; font-weight: bold; }
        .student-name { font-size: 1.1em; color: var(--primary); }
        .student-level { font-size: 0.8em; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }

        /* Стиль зошита (Notebook) */
        .notebook-container { display: none; margin-top: 20px; padding: 20px; background: white; border-radius: 12px; border: 1px solid #e0e0e0; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .notebook-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .notebook-title { font-size: 1.2em; color: var(--primary); }
        
        .notebook-page { 
            position: relative;
            width: 100%; 
            min-height: 400px; 
            background: #fff; 
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px);
            background-size: 100% 2rem; /* Смужки */
            padding: 2rem;
            box-sizing: border-box;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .notebook-text {
            font-family: 'Comic Sans MS', 'Cursive', sans-serif; /* "Рукописний" шрифт */
            font-size: 1.2rem;
            line-height: 2rem;
            color: var(--text-hand);
            white-space: pre-wrap; /* Зберігає переноси рядків */
        }
        
        /* Червоні поля */
        .notebook-page::before {
            content: '';
            position: absolute;
            top: 0; right: 4rem;
            width: 2px; height: 100%;
            background: #e74c3c;
            opacity: 0.6;
        }
        
        /* --- НОВИЙ СТИЛЬ: МАТЕМАТИКА (КЛІТИНКА) --- */
        .notebook-page.math {
            background-image: 
                linear-gradient(#f0f0f0 1px, transparent 1px), /* Горизонтальні лінії */
                linear-gradient(90deg, #f0f0f0 1px, transparent 1px); /* Вертикальні лінії */
            background-size: 2rem 2rem; /* Розмір клітинки 2х2 см (або 2rem) */
            background-position: left center;
        }

        .action-box { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-grade { background: #2ecc71; }
        .btn-grade:hover { background: #27ae60; }

        /* Стікер для оцінки */
        .grade-sticker { display: none; position: absolute; top: 2rem; right: 2rem; padding: 10px 20px; background: #e74c3c; color: white; border-radius: 50%; font-size: 2em; font-weight: bold; transform: rotate(15deg); box-shadow: 2px 2px 5px rgba(0,0,0,0.2); z-index: 10;}

        /* Різні типи почерку */
        .handwriting-excellent { 
            font-family: 'Segoe Script', 'Comic Sans MS', cursive; 
            letter-spacing: 1px; 
            word-spacing: 2px;
        }
        .handwriting-good { 
            font-family: 'Comic Sans MS', cursive; 
            transform: rotate(-0.5deg); 
        }
        .handwriting-needs_help { 
            font-family: 'Cursive', sans-serif; 
            letter-spacing: -1px; 
            filter: blur(0.3px); /* Легке розмиття, ніби олівець */
            transform: rotate(1deg);
        }
        
        /* Ефекти брудного зошита */
        .notebook-page.messy::after {
            content: '';
            position: absolute;
            top: 20%; left: 70%;
            width: 100px; height: 100px;
            background: url('https://www.transparenttextures.com/patterns/coffee-stain.png');
            opacity: 0.3;
            pointer-events: none;
        }
        
        .notebook-page.perfect {
            border-left: 5px solid #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>
            <a href="index.html" class="back-link">← Назад до кабінету</a>
            <h1>🔍 Перевірка робіт (Тренажер)</h1>
        </div>
        <div class="controls">
            <select id="subjectSelect">
                <option value="math">Математика</option>
                <option value="ukr">Українська мова</option>
                <option value="reading">Читання</option>
                <option value="eng">Англійська мова</option>
                <option value="world">Я досліджую світ</option>
            </select>
            <button onclick="generateClassResponses()">Отримати роботи учнів</button>
        </div>
    </div>

    <div style="display: flex; gap: 20px;">
        <div style="flex: 1;">
            <h3>Учні класу (8)</h3>
            <div id="studentList" class="student-list">
                </div>
        </div>

        <div style="flex: 2;">
            <div id="notebookContainer" class="notebook-container">
                <div class="notebook-header">
                    <div class="notebook-title">Зошит: <strong id="currentStudentName"></strong></div>
                    <div class="notebook-level" id="currentStudentLevel"></div>
                </div>
                
                <div class="notebook-page">
                    <div id="gradeSticker" class="grade-sticker">10</div>
                    <div class="notebook-text" id="notebookText" contenteditable="true"></div>
                </div>

                <div class="action-box" style="background: #fdf2f2; padding: 15px; border-radius: 8px; border: 1px solid #fab1a0; margin-top: 20px;">
                    <div style="display: flex; flex-direction: column; gap: 15px;"> <div style="display: flex; align-items: flex-start; gap: 10px;"> <div style="display: flex; align-items: center; gap: 5px;">
                                <label style="font-weight: bold;">Оцінка (1-12):</label>
                                <input type="number" id="quickGrade" min="1" max="12" style="width: 60px; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                            </div>
                            
                            <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 5px;">
                                <label style="font-weight: bold;">Коментар вчителя (необов'язково):</label>
                                <textarea id="teacherComment" placeholder="Наприклад: Чудова робота, Максиме! Будь уважнішим у 2-му прикладі." 
                                          style="width: 100%; height: 80px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: sans-serif; resize: vertical;"></textarea>
                            </div>
                        </div>
                        <button class="btn-grade" onclick="sendGradeToJournal()" style="background: #e17055; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1em; width: 100%;">
                            ✅ Підписати зошит та поставити в журнал
                        </button>
                    </div>
                </div>
                <div id="gradesArchive" style="margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc; display: none;">
                    <h4 style="margin-top: 0; color: #7f8c8d; border-bottom: 1px solid #eee; padding-bottom: 5px;">📜 Історія оцінок з цього предмета:</h4>
                    <div id="archiveList" style="display: flex; flex-wrap: wrap; gap: 10px;">
                        </div>
                </div>
            </div>
            
            <div id="emptyMsg" style="text-align: center; margin-top: 100px; color: #95a5a6;">
                <p>Натисніть "Отримати роботи учнів" та оберіть учня зі списку ліворуч.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
      authDomain: "darya-school.firebaseapp.com",
      projectId: "darya-school",
      databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
      storageBucket: "darya-school.firebasestorage.app",
      messagingSenderId: "228276864041",
      appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged((user) => {
        if (!user) { window.location.href = "login.html"; }
    });

    const database = firebase.database();
    let students = [];
    let generatedResponses = {}; 
    let currentSelectedStudentId = null;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const subjectParam = urlParams.get('subject');
        const studentIdParam = urlParams.get('studentId'); // Отримуємо ID учня з посилання
        
        if (subjectParam) {
            document.getElementById('subjectSelect').value = subjectParam;

            setTimeout(() => { 
                generateClassResponses(); // Спочатку генеруємо роботи
                
                // Якщо в URL був ID учня — відкриваємо його зошит після генерації
                if (studentIdParam) {
                    setTimeout(() => {
                        showStudentNotebook(studentIdParam);
                    }, 500);
                }
            }, 1000);
        }
    }

    // 1. ЗАВАНТАЖЕННЯ УЧНІВ
    database.ref('students_v2').on('value', (snapshot) => {
        const data = snapshot.val();
        students = [];
        if (data) {
            Object.keys(data).forEach(key => {
                students.push({ id: key, ...data[key] });
            });
            students.sort((a, b) => a.lastName.localeCompare(b.lastName, 'uk'));
            renderStudentList();
        }
    });

    // 2. РЕНДЕР СПИСКУ
    function renderStudentList() {
        const list = document.getElementById('studentList');
        list.innerHTML = '';
        if (students.length === 0) {
            list.innerHTML = '<p style="color:#95a5a6;">Спершу додайте учнів у "Реєстрації"</p>';
            return;
        }
        students.forEach(s => {
            const item = document.createElement('div');
            item.className = 'student-item';
            item.id = `student-${s.id}`;
            item.onclick = () => showStudentNotebook(s.id);
            const levelMap = { 'excellent': 'Відмінник', 'good': 'Хорошист', 'needs_help': 'Слабкий' };
            item.innerHTML = `
                <div class="student-name"><strong>${s.lastName}</strong> ${s.firstName}</div>
                <div class="student-level">${levelMap[s.level] || 'Невказано'}</div>
            `;
            list.appendChild(item);
        });
    }

    // 3. ГЕНЕРАЦІЯ (window. для глобального доступу)
    window.generateClassResponses = function() {
        if (students.length === 0) return;
        const subject = document.getElementById('subjectSelect').value;
        
        database.ref('homework_v2').once('value', (snapshot) => {
            const allHomework = snapshot.val() || {};
            let lastTaskDescription = "Робота над завданням з підручника.";
            for (let i = 1; i <= 15; i++) {
                const task = allHomework[`${subject}_hw_${i}`];
                if (task && task.trim() !== "") { lastTaskDescription = task; }
            }

            students.forEach(s => {
                generatedResponses[s.id] = getAIGeneratedResponse(subject, s.level, lastTaskDescription);
            });

            alert(`Роботи з предмета згенеровано!`);
            if (currentSelectedStudentId) showStudentNotebook(currentSelectedStudentId);
        });
    };

    // 4. ВІДОБРАЖЕННЯ ЗОШИТА (ВИПРАВЛЕНО)
    function showStudentNotebook(studentId) {
        currentSelectedStudentId = studentId;
        const subject = document.getElementById('subjectSelect').value;
        const student = students.find(s => s.id === studentId);

        // Очищаємо старі візуальні класи (messy, perfect)
        notebookPage.classList.remove('messy', 'perfect', 'math'); // <-- Додайте 'math' сюди
    
        // --- НОВА ЛОГІКА: ФОН КЛІТИНКА ---
        if (subject === 'math') {
            notebookPage.classList.add('math'); // Додаємо клітинку для математики
        }
        
        if (!student) return;

        // 1. Оновлюємо архів (винесено в логіку всередині)
        const archiveList = document.getElementById('archiveList');
        const archiveContainer = document.getElementById('gradesArchive');
        archiveList.innerHTML = ''; 
        
        database.ref('grades_v2').once('value', (snapshot) => {
            const allGrades = snapshot.val() || {};
            let hasGrades = false;
            for (let i = 1; i <= 12; i++) {
                const key = `${subject}_${studentId}_${i}`;
                const gradeData = allGrades[key];
                if (gradeData) {
                    hasGrades = true;
                    const val = typeof gradeData === 'object' ? gradeData.value : gradeData;
                    const comm = typeof gradeData === 'object' ? gradeData.comment : '';
                    const date = typeof gradeData === 'object' ? gradeData.date : 'Раніше';

                    const gradeBox = document.createElement('div');
                    gradeBox.className = 'archive-item'; // Можна додати стиль в CSS
                    gradeBox.style = `background: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.9em; min-width: 60px; text-align: center; cursor: help;`;
                    gradeBox.title = comm || "Без коментаря";
                    gradeBox.innerHTML = `<div style="color: #e74c3c; font-weight: bold; font-size: 1.2em;">${val}</div>
                                          <div style="font-size: 0.7em; color: #95a5a6;">${date}</div>`;
                    archiveList.appendChild(gradeBox);
                }
            }
            archiveContainer.style.display = hasGrades ? 'block' : 'none';
        });

        // 2. Візуальний стан зошита
        const notebookPage = document.querySelector('.notebook-page');
        const notebookTextBlock = document.getElementById('notebookText');

        notebookPage.classList.remove('messy', 'perfect');
        notebookTextBlock.classList.remove('handwriting-excellent', 'handwriting-good', 'handwriting-needs_help');

        if (student.level === 'excellent') {
            notebookPage.classList.add('perfect');
            notebookTextBlock.classList.add('handwriting-excellent');
        } else if (student.level === 'needs_help') {
            notebookPage.classList.add('messy');
            notebookTextBlock.classList.add('handwriting-needs_help');
        } else {
            notebookTextBlock.classList.add('handwriting-good');
        }

        // 3. Колір чорнила та текст
        const blueShades = ['#2c3e50', '#000080', '#191970', '#1e3799'];
        notebookTextBlock.style.color = blueShades[Math.floor(Math.random() * blueShades.length)];
        notebookTextBlock.style.textDecoration = "none"; // Скидаємо "червону ручку" для нового зошита

        const text = generatedResponses[studentId];
        notebookTextBlock.innerText = text || "Натисніть кнопку генерації.";

        notebookTextBlock.style.color = blueShades[Math.floor(Math.random() * blueShades.length)];
        // Це важливо: скидаємо примусовий колір попереднього редагування
        document.execCommand('foreColor', false, notebookTextBlock.style.color);

        // 4. Активний учень у списку
        document.querySelectorAll('.student-item').forEach(item => item.classList.remove('active'));
        const el = document.getElementById(`student-${studentId}`);
        if(el) el.classList.add('active');

        document.getElementById('emptyMsg').style.display = 'none';
        document.getElementById('notebookContainer').style.display = 'block';
        document.getElementById('gradeSticker').style.display = 'none';
        document.getElementById('currentStudentName').innerText = `${student.firstName} ${student.lastName}`;
    }

    // 5. ЛОГІКА ШІ (ПОВНІСТЮ ВИПРАВЛЕНО)
    function getAIGeneratedResponse(subject, level, task) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('uk-UA');
        const random = (arr) => arr[Math.floor(Math.random() * arr.length)];
        
        const intros = ["Домашня робота", "Домашнє завдання", "Робота вдома"];
    
        // 1. ПАРСИНГ ПРИКЛАДІВ (Тільки для математики)
        let mathContent = "";
        if (subject === 'math') {
            const mathRegex = /(\d+[\+\-\*\/x:]\d+)/g; 
            const foundExamples = task.match(mathRegex);
    
            if (foundExamples && foundExamples.length > 0) {
                foundExamples.forEach((example, index) => {
                    try {
                        let cleanExample = example.replace(':', '/').replace('x', '*');
                        let result = eval(cleanExample); 
    
                        if (level === 'excellent') {
                            mathContent += `${index + 1}) ${example} = ${result}\n`;
                        } else if (level === 'good') {
                            // Помилка з шансом 20%
                            let finalResult = (Math.random() > 0.8) ? result + 1 : result;
                            mathContent += `${index + 1}) ${example} = ${finalResult}\n`;
                        } else {
                            // Слабкий учень пише випадково
                            mathContent += `${index + 1}) ${example} = ${Math.floor(Math.random() * 50)}\n`;
                        }
                    } catch (e) {
                        mathContent += `${index + 1}) ${example} = ?\n`;
                    }
                });
            }
        }
    
        // 2. ФОРМУВАННЯ ФІНАЛЬНОГО ТЕКСТУ
        const intro = random(intros);
    
        // Логіка для МАТЕМАТИКИ
        if (subject === 'math') {
            const body = mathContent || "Завдання виконано.";
            return `${dateStr}.\n${intro}.\n\n${body}`;
        }
    
        // Логіка для ІНШИХ ПРЕДМЕТІВ
        if (level === 'excellent') {
            return `${dateStr}.\n${intro}.\n\nЗавдання: ${task}\n\nТекст переписано охайно. Помилок не виявлено.`;
        }
        
        if (level === 'good') {
            return `${dateStr}.\n${intro}.\n\nЗавдання: ${task}\n\nЯ старався, але міг десь помилитися.`;
        }
    
        return `${dateStr}.\n${intro}.\n\nЯ не зовсім зрозумів завдання: "${task}".`;
    } // Кінець функції

    // 6. ОЦІНКА ТА ЗВУК
    window.sendGradeToJournal = function() {
        const gradeValue = document.getElementById('quickGrade').value;
        const commentValue = document.getElementById('teacherComment').value; // Отримуємо текст
        const subject = document.getElementById('subjectSelect').value;
        
        if (!currentSelectedStudentId || !gradeValue) { alert("Оберіть учня та поставте оцінку!"); return; }
    
        database.ref('grades_v2').once('value', (snapshot) => {
            const allGrades = snapshot.val() || {};
            let targetCol = 1;
            
            for (let i = 1; i <= 12; i++) {
                if (!allGrades[`${subject}_${currentSelectedStudentId}_${i}`]) {
                    targetCol = i; break;
                }
            }
            
            const key = `${subject}_${currentSelectedStudentId}_${targetCol}`;
            
            // Зберігаємо об'єкт: і оцінку, і коментар
            const dataToSave = {
                value: gradeValue,
                comment: commentValue,
                date: new Date().toLocaleDateString('uk-UA')
            };
    
            database.ref(`grades_v2/${key}`).set(dataToSave).then(() => {
                // Звук печатки
                new Audio('https://www.soundjay.com/communication/sounds/stamp-mount-1.mp3').play();
                
                // Відображаємо оцінку на зошиті
                const s = document.getElementById('gradeSticker');
                s.innerText = gradeValue;
                s.style.display = 'block';
                
                // Відображаємо коментар внизу зошита (червоним кольором)
                const notebook = document.getElementById('notebookText');
                notebook.innerHTML += `\n\n<span style="color: #d63031; font-family: 'Caveat', cursive; border-top: 1px dashed #fab1a0; display: block; padding-top: 10px;">Вчитель: ${commentValue || 'Перевірено.'}</span>`;

                // Оновлюємо архів відразу
                showStudentNotebook(currentSelectedStudentId);
                
                // Очищаємо поля
                document.getElementById('quickGrade').value = '';
                document.getElementById('teacherComment').value = '';
                
                alert(`Учня ${currentSelectedStudentId} оцінено!`);
            });
        });
    };
    
    // Коли вчитель клікає в зошит, вмикається "червона ручка"
    document.getElementById('notebookText').addEventListener('focus', function() {
        // Встановлюємо колір тексту для нових символів
        document.execCommand('foreColor', false, '#e74c3c');
    });
    
    // Додатковий захист: якщо вона виділить текст і почне писати, він теж буде червоним
    document.getElementById('notebookText').addEventListener('keydown', function(e) {
        if (!document.queryCommandValue('foreColor').includes('rgb(231, 76, 60)')) {
            document.execCommand('foreColor', false, '#e74c3c');
        }
    });
</script>

</body>
</html>
