<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <title>Панель вчителя 3-Б</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --schedule: #3498db;
            --students: #2ecc71;
            --journal: #f1c40f;
            --analytics: #9b59b6;
            --reports: #3f51b5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            color: #34495e;
            letter-spacing: -1px;
        }

        /* СІТКА КНОПОК */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .nav-card i {
            font-size: 2.5em;
            margin-bottom: 15px;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
            filter: brightness(1.1);
        }

        /* Стилі для конкретних кнопок */
        .btn-schedule { background-color: var(--schedule); }
        .btn-students { background-color: var(--students); }
        .btn-journal { background-color: var(--journal); color: #000; }
        .btn-analytics { background-color: var(--analytics); }
        .btn-reports { background-color: var(--reports); }

        /* БЛОК СТАТУСУ */
        #status-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-left: 8px solid var(--analytics);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        #today-date { font-weight: 800; color: #34495e; margin: 0; }
        .bday-tag { color: #e67e22; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        @media (max-width: 600px) {
            .nav-grid { grid-template-columns: 1fr 1fr; }
            header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>Мій Кабінет 3-Б</h1>
    </header>

    <nav class="nav-grid">
        <a href="schedule.html" class="nav-card btn-schedule">
            <span>📅</span> Розклад
        </a>
        <a href="students.html" class="nav-card btn-students">
            <span>👥</span> Учні
        </a>
        <a href="journal.html" class="nav-card btn-journal">
            <span>📓</span> Журнал
        </a>
        <a href="analytics.html" class="nav-card btn-analytics">
            <span>📊</span> Аналітика
        </a>
        <a href="reports.html" class="nav-card btn-reports">
            <span>📈</span> Прогрес
        </a>
    </nav>

    <div id="status-box">
        <div class="status-header">
            <h3 id="today-date">Завантаження дати...</h3>
            <div id="birthday-tag" class="bday-tag"></div>
        </div>
        <p id="class-summary" style="color: #7f8c8d; margin: 0;"></p>
    </div>
    <div id="hw-widget" style="margin-top: 20px; padding: 25px; background: #fff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 8px solid #3498db;">
        <h3 style="margin: 0 0 15px 0; color: #2c3e50; display: flex; align-items: center; gap: 10px;">
            <span>📝</span> План на наступний урок:
        </h3>
        <div id="hw-list-container">
            <p style="color: #95a5a6; font-style: italic;">Завантаження завдань...</p>
        </div>
    </div>
</div>

<script>
    // 1. КОНФІГУРАЦІЯ FIREBASE (Використовуйте свій databaseURL)
    const firebaseConfig = {
      apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
      authDomain: "darya-school.firebaseapp.com",
      databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "darya-school",
      storageBucket: "darya-school.firebasestorage.app",
      messagingSenderId: "228276864041",
      appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. ЗАХИСТ: Перевірка авторизації
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });

    // 3. ФУНКЦІЯ ОНОВЛЕННЯ ДАШБОРДУ
    function updateDashboard() {
        const now = new Date();
        
        // Встановлюємо дату відразу
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('today-date').innerText = now.toLocaleDateString('uk-UA', options);

        // Отримуємо дані з Firebase (одноразово для дашборду або через .on для автооновлення)
        // Використовуємо .on('value'), щоб дашборд оновлювався сам, якщо ви змінили дані в іншій вкладці
        
        const studentsRef = database.ref('students_v2');
        const homeworkRef = database.ref('homework_v2');

        // Слухаємо учнів
        studentsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            let students = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    students.push({ id: key, ...data[key] });
                });
            }

            // Статистика учнів
            const boys = students.filter(s => s.gender === 'Хлопчик').length;
            const girls = students.filter(s => s.gender === 'Дівчинка').length;
            document.getElementById('class-summary').innerText = 
                `У класі ${students.length} учнів (${boys} хлопчиків та ${girls} дівчаток).`;

            // Іменинники (порівнюємо МІСЯЦЬ та ДЕНЬ)
            const currentMonthDay = now.toISOString().slice(5, 10); // "MM-DD"
            const bdayStudent = students.find(s => s.birthDate && s.birthDate.slice(5, 10) === currentMonthDay);
            const bdayTag = document.getElementById('birthday-tag');
            
            if (bdayStudent) {
                bdayTag.innerHTML = `🎂 Сьогодні день народження у <strong>${bdayStudent.firstName}</strong>!`;
            } else {
                bdayTag.innerText = "🎈 Сьогодні без іменинників";
            }
        });

        // Слухаємо домашнє завдання
        homeworkRef.on('value', (snapshot) => {
            const allHomework = snapshot.val() || {};
            const hwContainer = document.getElementById('hw-list-container');
            const subjects = {
                math: "Математика",
                ukr: "Українська мова",
                reading: "Читання",
                eng: "Англійська мова",
                world: "Я досліджую світ"
            };

            let hwHTML = "";
            let foundAny = false;

            Object.keys(subjects).forEach(subKey => {
                // Знаходимо останнє введене ДЗ для цього предмета (серед 12 колонок)
                let lastTask = "";
                for (let i = 1; i <= 12; i++) {
                    const task = allHomework[`${subKey}_hw_${i}`];
                    if (task && task.trim() !== "") {
                        lastTask = task; // Запам'ятовуємо останнє знайдене
                    }
                }

                if (lastTask) {
                    hwHTML += `
                        <div style="margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #eee;">
                            <strong style="color: #3498db;">${subjects[subKey]}:</strong> 
                            <span style="color: #34495e;">${lastTask}</span>
                        </div>`;
                    foundAny = true;
                }
            });

            hwContainer.innerHTML = foundAny ? hwHTML : '<p style="color: #95a5a6;">На сьогодні завдань не знайдено. Заповніть їх у журналі.</p>';
        });
    }

    // Запуск при завантаженні
    document.addEventListener('DOMContentLoaded', updateDashboard);

    // Функція виходу (додайте кнопку в HTML, якщо потрібно)
    window.logout = function() {
        firebase.auth().signOut().then(() => {
            window.location.href = "login.html";
        });
    };

    // Дзвінок на урок
    window.addEventListener('click', function() {
        const audio = new Audio('https://www.soundjay.com/misc/sounds/school-bell-1.mp3');
        audio.volume = 0.2; // Робимо не дуже голосно
        audio.play();
    }, { once: true }); // Спрацює лише один раз при першому кліку
</script>

</body>
</html>
