<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет вчителя</title>
    <style>
        :root { --primary: #34495e; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .menu-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); margin-bottom: 30px; }
        .nav-buttons { display: grid; gap: 20px; }
        .btn { padding: 15px 30px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; color: white; transition: 0.3s; }
        .btn-schedule { background: var(--accent); }
        .btn-students { background: #2ecc71; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>Кабінет вчителя 3-Б</h1>
        <div class="nav-buttons">
            <a href="schedule.html" class="btn btn-schedule">📅 Розклад занять</a>
            <a href="students.html" class="btn btn-students">👥 Список учнів</a>
            <a href="journal.html" class="btn" style="background: #f1c40f; color: #000;">📓 Електронний журнал</a>
            <a href="analytics.html" class="btn" style="background: #9b59b6;">📊 Аналітика</a>
            <a href="reports.html" class="btn btn-reports" style="background: #3f51b5; color: #fff;">📈 Звіти та Прогрес</a>
        </div>
    </div>
</body>
</html>
