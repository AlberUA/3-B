<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід до кабінету 3-Б</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; shadow: 0 5px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Вхід для вчителя</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="login()">Увійти</button>
    <p id="error" style="color:red; font-size: 13px;"></p>
</div>

<script>
    const firebaseConfig = { /* ВАШ КОНФІГ */ };
    firebase.initializeApp(firebaseConfig);

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        firebase.auth().signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                // Успішний вхід -> перенаправляємо на головну
                window.location.href = "index.html"; 
            })
            .catch((error) => {
                document.getElementById('error').innerText = "Помилка: " + error.message;
            });
    }
</script>
</body>
</html>
