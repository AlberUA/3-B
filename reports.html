<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <title>Звіти та Прогрес | 3-Б</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="favicon.ico">
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px;
        }
        
        select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1em; outline: none; }
        
        .chart-container { position: relative; height: 400px; width: 100%; }
        
        .back-link { display: inline-block; color: #3498db; text-decoration: none; font-weight: 500; }
        h2 { margin-top: 0; color: var(--primary); }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .no-data { text-align: center; padding: 50px; color: #95a5a6; font-style: italic; }

        /* Нові стилі для картки успішності */
        .overall-stats {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #3498db, #8e44ad);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .stat-card span { font-size: 0.9em; opacity: 0.9; }
        .stat-card div { font-size: 2em; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Назад до кабінету</a>
    <h1>📈 Індивідуальний прогрес учня</h1>

    <div class="controls">
        <div>
            <label style="display:block; margin-bottom:5px; font-size:0.8em; color:#666;">Оберіть учня:</label>
            <select id="studentSelect" onchange="updateChart()"></select>
        </div>
        <div>
            <label style="display:block; margin-bottom:5px; font-size:0.8em; color:#666;">Оберіть предмет:</label>
            <select id="subjectSelect" onchange="updateChart()">
                <option value="math">Математика</option>
                <option value="ukr">Українська мова</option>
                <option value="reading">Читання</option>
                <option value="eng">Англійська мова</option>
                <option value="world">Я досліджую світ</option>
            </select>
        </div>
    </div>

    <div class="overall-stats" id="statsContainer" style="display:none;">
        <div class="stat-card">
            <span>Загальна успішність (сер. бал)</span>
            <div id="studentAverage">0.0</div>
        </div>
    </div>

    <div id="chartWrapper" class="chart-container">
        <canvas id="progressChart"></canvas>
    </div>
    <div id="emptyMsg" class="no-data" style="display:none;">Оцінок за цим предметом поки що немає.</div>
</div>

<script>
    // 1. КОНФІГУРАЦІЯ FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyC_B3MJTramTQ4PEj8Ws6pEIambP-JJ1rg",
      authDomain: "darya-school.firebaseapp.com",
      databaseURL: "https://darya-school-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "darya-school",
      storageBucket: "darya-school.firebasestorage.app",
      messagingSenderId: "228276864041",
      appId: "1:228276864041:web:8e46975a0a9140e0580838"
    };

    firebase.initializeApp(firebaseConfig);

    // ЗАХИСТ: Перевірка авторизації
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });
    
    const database = firebase.database();
    
    let students = [];
    let allGrades = {};
    let myChart = null;

    // СЛУХАЧІ ДАНИХ
    
    // Завантаження учнів для випадаючого списку
    database.ref('students_v2').on('value', (snapshot) => {
        const data = snapshot.val();
        students = [];
        const studentSelect = document.getElementById('studentSelect');
        
        // Зберігаємо поточне вибране значення, щоб воно не злетіло при оновленні
        const currentSelected = studentSelect.value;
        studentSelect.innerHTML = '<option value="">Оберіть учня...</option>';

        if (data) {
            Object.keys(data).forEach(key => {
                students.push({ id: key, ...data[key] });
            });
            // Сортування для зручності пошуку в списку
            students.sort((a, b) => a.lastName.localeCompare(b.lastName, 'uk'));

            students.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id; // Використовуємо ID як value
                option.textContent = `${s.lastName} ${s.firstName}`;
                studentSelect.appendChild(option);
            });
            
            // Повертаємо вибір, якщо він був
            if (currentSelected) studentSelect.value = currentSelected;
        }
    });

    // Завантаження оцінок
    database.ref('grades_v2').on('value', (snapshot) => {
        allGrades = snapshot.val() || {};
        // Якщо учень вже обраний — оновлюємо графік миттєво
        if (document.getElementById('studentSelect').value) {
            updateChart();
        }
    });

    // ФУНКЦІЯ ОНОВЛЕННЯ ГРАФІКА ТА РОЗРАХУНКУ СЕРЕДНЬОГО БАЛУ
    window.updateChart = function() {
        const studentId = document.getElementById('studentSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const statsContainer = document.getElementById('statsContainer');
        const studentAverage = document.getElementById('studentAverage');
        
        if (!studentId) {
            statsContainer.style.display = 'none';
            return;
        }
    
        const studentData = students.find(s => s.id === studentId);
        
        // --- РОЗРАХУНОК ЗАГАЛЬНОЇ УСПІШНОСТІ (по всіх предметах) ---
        let totalSum = 0;
        let totalCount = 0;
        const allSubjectKeys = ['math', 'ukr', 'reading', 'eng', 'world'];
    
        Object.keys(allGrades).forEach(key => {
            // Ключ має містити ID учня (формат: subject_studentId_column)
            if (key.includes(`_${studentId}_`)) {
                const val = parseInt(allGrades[key]);
                if (!isNaN(val)) {
                    totalSum += val;
                    totalCount++;
                }
            }
        });
    
        const finalAvg = totalCount > 0 ? (totalSum / totalCount).toFixed(1) : "0.0";
        studentAverage.innerText = finalAvg;
        statsContainer.style.display = 'flex';
    
        // --- ЛОГІКА ГРАФІКА (залишається по конкретному предмету) ---
        let gradesArray = [];
        let labelsArray = [];
        let hasData = false;
    
        for(let i=1; i<=12; i++) {
            const key = `${subject}_${studentId}_${i}`;
            const val = allGrades[key];
            labelsArray.push(`${i}`);
            if (val && !isNaN(val)) {
                gradesArray.push(parseInt(val));
                hasData = true;
            } else {
                gradesArray.push(null); 
            }
        }
    
        const ctx = document.getElementById('progressChart').getContext('2d');
        const emptyMsg = document.getElementById('emptyMsg');
        const chartWrapper = document.getElementById('chartWrapper');
    
        if (!hasData) {
            emptyMsg.style.display = 'block';
            chartWrapper.style.opacity = '0';
            if (myChart) myChart.destroy();
            return;
        } else {
            emptyMsg.style.display = 'none';
            chartWrapper.style.opacity = '1';
        }
    
        if (myChart) myChart.destroy();
    
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsArray,
                datasets: [{
                    label: `Прогрес (${document.getElementById('subjectSelect').options[document.getElementById('subjectSelect').selectedIndex].text})`,
                    data: gradesArray,
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    pointRadius: 6,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#3498db',
                    spanGaps: true 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 12, ticks: { stepSize: 1 } }
                }
            }
        });
    };
</script>

</body>
</html>
